# --- Core Settings ---
set -ag terminal-overrides ",xterm-256color:RGB"
set -g prefix C-s
set -g mouse on
set -g base-index 1          # Start numbering at 1
setw -g pane-base-index 1
set -g status-position top
set -g status-justify center

set -g renumber-windows on   # Automatically renumber when a window is closed

# --- Keybindings ---
unbind r
bind r source-file ~/.tmux.conf
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R 

# --- Darkvoid Status Bar Aesthetic ---
# set -g status-style bg=default,fg=white
set -g status-style bg="#1c1c1c",fg="#c0c0c0"
set -g status-justify absolute-centre


set -g status-left-length 20
set -g status-left ""

set -g status-right-length 20
set -g status-right "#[fg=#585858] %H:%M "

# --- Window Status (The Fix for Navigation) ---
# Inactive Windows: Muted grey, no special background
# setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-format "#[fg=#585858,bg=#1c1c1c] #I:#W "
# Active Window: High contrast White/Bold or Yellow to match Darkvoid "glow"
# We add a subtle bracket or different color so you IMMEDIATELY know where you are
# setw -g window-status-current-format "#[fg=white,bold,bg=default] > #I:#W < "
setw -g window-status-current-format "#[fg=#bdfe58,bg=#1c1c1c,bold] #I:#W "

# Pane Borders (Minimalist)
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=white

# --- Plugins (Reduced to Essentials) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
